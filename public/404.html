<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Sanjay Sales B2B</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This redirect works for SPA routing on GitHub Pages.
      // It redirects to index.html with the original path stored as a query parameter.
      var segmentCount = 1; // 1 segment for /SanjaySales/
      var location = window.location;
      var newPath = location.protocol + '//' + location.hostname + (location.port ? ':' + location.port : '') +
        location.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?' +
        location.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (location.search ? '&' + location.search.slice(1).replace(/&/g, '~and~') : '') +
        location.hash;
      location.replace(newPath);
    </script>
  </head>
  <body>
    Redirecting to Sanjay Sales...
  </body>
</html>
